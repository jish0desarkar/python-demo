<section class="panel">
  <h3 style="margin: 0;">Users</h3>

  {% if users %}
    <ul class="clean">
      {% for user in users %}
        <li>
          <strong>
            <a
              href="/users/{{ user.id }}"
              hx-get="/users/{{ user.id }}"
              hx-target="#app-content"
              hx-swap="innerHTML"
            >
              {{ user.name }}
            </a>
          </strong>
          <div class="muted">{{ user.email }} · account {{ user.account.name if user.account else user.account_id }}</div>
        </li>
      {% endfor %}
    </ul>
  {% else %}
    <p class="muted">No users yet.</p>
  {% endif %}
</section>
