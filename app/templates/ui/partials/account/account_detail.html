<section id="account-detail">
  <section class="panel">
    <p>
      <a href="/accounts" hx-get="/accounts" hx-target="#app-content" hx-swap="innerHTML">
        Back to accounts
      </a>
    </p>
    <h2>{{ account.name }}</h2>
    <p class="muted">Account #{{ account.id }}. Link shared sources below.</p>
    <p class="muted">
      Keywords:
      {% if account.keyword_list %}
        {{ account.keywords }}
      {% else %}
        none
      {% endif %}
    </p>
  </section>

  {% include "ui/partials/source/sources_panel.html" %}
</section>
