<section id="users-page">
  <section class="panel">
    <h2>Users</h2>
    <p class="muted">Create users and assign each one to an account.</p>
  </section>

  <section class="panel">
    {% include "ui/partials/shared/flash.html" %}

    <form action="/users" method="post" hx-post="/users" hx-target="#app-content" hx-swap="innerHTML">
      <h3 style="margin: 0;">Create User</h3>
      <label>
        Name
        <input type="text" name="name" value="{{ form_data.name }}" required maxlength="255" />
      </label>
      <label>
        Email
        <input type="email" name="email" value="{{ form_data.email }}" required maxlength="320" />
      </label>
      <label>
        Account
        <select name="account_id" required>
          <option value="">Select an account</option>
          {% for account in accounts %}
            <option value="{{ account.id }}" {% if form_data.account_id == account.id %}selected{% endif %}>
              {{ account.name }}
            </option>
          {% endfor %}
        </select>
      </label>
      <button type="submit">Create user</button>
    </form>
  </section>

  <section class="panel">
    <form
      hx-get="/users"
      hx-target="#users-page"
      hx-swap="outerHTML"
      hx-trigger="input changed delay:300ms, submit"
      hx-indicator="#users-list-loading"
    >
      <label>
        Search by name or email
        <input
          type="search"
          name="q"
          value="{{ form_data.q }}"
          placeholder="e.g. alice or @example.com"
        />
      </label>
    </form>
  </section>

  <p id="users-list-loading" class="muted htmx-indicator" aria-live="polite">Loading users...</p>

  <div id="users-list-content">
    {% include "ui/partials/user/users_list.html" %}
  </div>
</section>
